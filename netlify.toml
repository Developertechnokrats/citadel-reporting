[build]
  publish = "public"
  functions = "netlify/functions"

[dev]
  port = 8888
  targetPort = 3000

[[redirects]]
  from = "/webhook/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"
